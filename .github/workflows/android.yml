# ================================================================
# Android CI/CD — ToDoList
# ================================================================
#
# 트리거 전략:
#   main 브랜치 push / PR  →  Job 1: Debug APK 빌드
#   v* 태그 push           →  Job 2: Release APK 서명 + GitHub Release 게시
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   : base64 인코딩된 .jks 키스토어 파일 전체 내용
#   KEY_ALIAS         : 키스토어 안의 키 alias 이름
#   KEY_PASSWORD      : 키(key) 비밀번호
#   STORE_PASSWORD    : 키스토어(store) 비밀번호
# ================================================================

name: Android CI/CD

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

# 동일 브랜치/태그에 중복 실행 중인 워크플로우는 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────────────────────
# Job 1 · Debug Build  (main 브랜치 push / PR)
# ────────────────────────────────────────────────────────────────
jobs:
  build-debug:
    name: "Build Debug APK"
    # v* 태그 push 시에는 실행하지 않음
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin) + Gradle cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 2 · Release Build → Sign → GitHub Release 게시  (v* 태그)
  # ──────────────────────────────────────────────────────────────
  release:
    name: "Build, Sign & Publish Release APK"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write   # GitHub Release 생성 + 자산 업로드에 필요

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin) + Gradle cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ── APK 서명 ─────────────────────────────────────────────
      - name: Sign APK with apksigner
        run: |
          # 1) Base64 Secret → 키스토어 파일 복원
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

          # 2) 설치된 Build-tools 중 가장 최신 버전 경로를 자동 탐지
          BUILD_TOOLS_DIR=$(ls -d "${ANDROID_SDK_ROOT}/build-tools"/* | sort -V | tail -1)
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"

          # 3) Gradle이 생성한 unsigned APK 경로 자동 탐색
          UNSIGNED_APK=$(find app/build/outputs/apk/release \
            \( -name "*-unsigned.apk" -o -name "*.apk" \) | head -1)

          # 4) 릴리즈 APK 최종 저장 경로 (태그 버전명 포함)
          TAG="${{ github.ref_name }}"
          SIGNED_APK="app/build/outputs/apk/release/ToDoList-${TAG}.apk"

          # 5) apksigner 서명 실행
          "${APKSIGNER}" sign \
            --ks            keystore.jks \
            --ks-key-alias  "${{ secrets.KEY_ALIAS }}" \
            --ks-pass       "pass:${{ secrets.STORE_PASSWORD }}" \
            --key-pass      "pass:${{ secrets.KEY_PASSWORD }}" \
            --out           "${SIGNED_APK}" \
            "${UNSIGNED_APK}"

          # 6) 서명 검증
          "${APKSIGNER}" verify --verbose "${SIGNED_APK}"

          # 7) 키스토어 즉시 제거 (보안)
          rm -f keystore.jks

          # 8) 이후 step에서 참조할 환경 변수 등록
          echo "SIGNED_APK=${SIGNED_APK}" >> "${GITHUB_ENV}"
          echo "TAG=${TAG}"               >> "${GITHUB_ENV}"

      # ── GitHub Release 생성 + 서명된 APK 자산 첨부 ───────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ env.TAG }}"
          generate_release_notes: true
          files: ${{ env.SIGNED_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}